# golangci-lint configuration for Comax Secrets.
#
# Kept intentionally small in M1; tune severities as the codebase grows.
# Compatible with both golangci-lint v1.55+ and v2.x.

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
