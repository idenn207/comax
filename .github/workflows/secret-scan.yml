name: secret-scan

# Secret scanning (M8 / plan Task 7). The repo is already public, so this is
# both a one-time HISTORY verification (did anything ever leak?) and an ongoing
# incremental gate. gitleaks isn't a Go module, so it runs via the official
# action on GitHub-hosted runners. The config (.gitleaks.toml) excludes known
# false positives — test fixtures and non-secret hashes — so a real leak is
# never buried under noise (security review S9).
on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly full-history sweep (Mon 06:00 UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the scan covers every commit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
