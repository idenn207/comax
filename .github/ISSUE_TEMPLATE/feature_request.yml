name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Comax Secrets is intentionally lean and self-host-first. Proposals that
        keep it NAS-friendly and low-footprint are the easiest to accept.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain, not just the solution. What are you unable to do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the CLI/API/UI shape if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you weighed.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits a self-hosted, single-operator tool (not multi-tenant SaaS).
          required: false
